<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://script.google.com">
  <title>ระบบรับสินค้า (GR)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { brand: { blue: '#171C8F', orange: '#E35205', blueLight: '#E8E9F4', orangeLight: '#FCECE5'} } } } }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f3f4f6; letter-spacing: 0.2px; }
    .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 16px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05); border: 1px solid rgba(255, 255, 255, 0.3); }
    .input-field { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #e5e7eb; background: #f9fafb; margin-top: 4px; outline: none; transition: all 0.2s; }
    .input-field:focus { border-color: #E35205; box-shadow: 0 0 0 2px rgba(227, 82, 5, 0.2); }
    .input-error { border-color: #ef4444 !important; box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2) !important; background-color: #fef2f2 !important; }
    .btn { width: 100%; padding: 12px; border-radius: 12px; font-weight: 500; text-align: center; cursor: pointer; border: none; display: flex; justify-content: center; align-items: center; gap: 0.5rem; font-size: 14px; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 10000; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast { min-width: 250px; padding: 1rem; border-radius: 0.75rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); display: flex; align-items: flex-start; gap: 0.75rem; background: white; border-left: 4px solid transparent; animation: slideInRight 0.3s cubic-bezier(0.4,0,0.2,1) forwards;}
    .toast.success { border-left-color: #10b981; } .toast.warning { border-left-color: #f59e0b; } .toast.error { border-left-color: #ef4444; }
    .toast.closing { animation: slideOutRight 0.3s cubic-bezier(0.4,0,0.2,1) forwards; }
    @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slideOutRight { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
    
    .loading-active { overflow: hidden; }
  </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col leading-relaxed loading-active">

  <!-- Auth UI -->
  <div id="auth-loading" class="fixed inset-0 bg-white z-[9999] flex flex-col justify-center items-center">
      <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-[#171C8F] mb-4"></div>
      <p class="text-[#171C8F] font-medium text-lg">กำลังตรวจสอบสิทธิ์...</p>
  </div>

  <div id="auth-error" class="fixed inset-0 bg-white z-[9999] hidden flex flex-col justify-center items-center p-6 text-center">
      <div class="bg-red-50 p-8 rounded-2xl max-w-md border border-red-100 shadow-lg">
          <i data-lucide="shield-alert" class="w-16 h-16 text-red-500 mx-auto mb-4"></i>
          <h2 class="text-xl font-bold text-gray-800 mb-2">ปฏิเสธการเข้าถึง</h2>
          <p id="error-message" class="text-gray-600 mb-6">คุณไม่มีสิทธิ์เข้าใช้งานแอปพลิเคชันนี้</p>
          <button onclick="window.location.href=APP_CONFIG.PORTAL_URL" class="px-6 py-2.5 bg-[#171C8F] text-white rounded-lg font-medium hover:bg-[#11146B] transition shadow-md">กลับไปหน้าหลัก (Portal)</button>
      </div>
  </div>

  <!-- App Content -->
  <div id="app-content" class="hidden flex-1 flex flex-col h-screen w-full">
      <nav class="bg-brand-orange text-white shadow-md sticky top-0 z-20">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
          <div class="flex justify-between items-center h-16">
            <div class="flex-shrink-0 flex items-center">
              <i data-lucide="box" class="w-6 h-6 mr-2"></i>
              <h1 class="text-lg font-semibold tracking-wide">ระบบรับสินค้า (GR)</h1>
            </div>
            <div class="flex items-center space-x-4">
              <p class="text-sm text-white/90 font-light hidden sm:block">ผู้รับของ: <span id="display-username" class="font-medium text-white">-</span></p>
              <button onclick="openReceiving(true)" class="flex items-center gap-1.5 bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg text-sm transition">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i> รีเฟรช
              </button>
              <button id="logout-btn" class="flex items-center gap-1.5 bg-red-500/80 hover:bg-red-500 px-3 py-1.5 rounded-lg text-sm transition shadow-sm border border-red-400/50">
                <i data-lucide="log-out" class="w-4 h-4"></i> ออก
              </button>
            </div>
          </div>
        </div>
      </nav>

      <main class="flex-1 overflow-y-auto p-4 md:p-6 w-full max-w-6xl mx-auto pb-10">
        
        <section id="receiving-list-view" class="block">
          <div class="flex justify-between items-end mb-4 px-1">
            <h2 class="text-lg font-semibold text-brand-orange">รายการบิลรอรับสินค้า</h2>
            <span class="text-xs font-medium bg-brand-orangeLight text-brand-orange px-2.5 py-1 rounded-full border border-brand-orange/20" id="pending-count">0 บิล</span>
          </div>

          <div class="mb-5 grid grid-cols-1 md:grid-cols-3 gap-3 px-1">
            <input type="text" id="r-search-input" oninput="renderPOListForReceiving()" placeholder="🔍 ค้นหาชื่อสินค้า, Vendor, เลข PO..." class="input-field m-0 text-sm py-2.5 bg-white shadow-sm font-medium border-gray-200">
            <select id="r-status-filter" onchange="renderPOListForReceiving()" class="input-field m-0 text-sm py-2.5 bg-white shadow-sm font-medium border-gray-200">
              <option value="">📌 ทุกสถานะ</option>
              <option value="Overdue">🚨 นานผิดปกติ (Overdue)</option>
              <option value="Draft GR">📦 กำลังลงสินค้า (Draft)</option>
              <option value="Pending Review">⏳ รอตรวจสอบ</option>
              <option value="Pending GR">🕒 รอรับเข้า</option>
            </select>
            <select id="r-warehouse-filter" onchange="renderPOListForReceiving()" class="input-field m-0 text-sm py-2.5 bg-white shadow-sm font-medium border-gray-200">
              <option value="">🛒 ทุกคลัง (All)</option>
              <option value="W1">W1</option><option value="W2">W2</option><option value="W3">W3</option>
              <option value="W4">W4</option><option value="W5">W5</option><option value="C1">C1</option><option value="C2">C2</option>
            </select>
          </div>
          
          <div id="po-list-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
        </section>

        <section id="receiving-detail-view" class="hidden">
          <div class="glass-card p-4 sm:p-5 relative max-w-3xl mx-auto">
            <button type="button" onclick="showView('receiving-list-view')" class="text-sm font-medium text-gray-500 flex items-center mb-5 hover:text-brand-orange transition"><i data-lucide="chevron-left" class="w-4 h-4 mr-1"></i> กลับไปหน้ารายการ</button>

            <div class="bg-white p-4 rounded-xl border border-gray-200 mb-6 shadow-sm flex flex-col gap-3">
              <div class="flex justify-between items-start">
                  <div>
                      <div class="flex items-center gap-2 mb-1.5" id="r-display-vendor-header">
                          <!-- ใส่ชื่อ Vendor และ Badge คลัง -->
                      </div>
                      <p class="text-xs font-normal text-gray-500">วันที่สั่ง: <span id="r-display-date" class="font-bold text-gray-700"></span></p>
                  </div>
                  <span id="r-display-status" class="px-2.5 py-1 rounded-md text-xs font-bold border shadow-sm"></span>
              </div>
              <div class="bg-gray-50 px-3 py-2 rounded-lg border border-gray-100 flex items-center justify-between">
                <p class="text-xs text-gray-500 font-medium">เลขที่อ้างอิง</p>
                <p class="text-sm font-bold text-brand-blue" id="r-display-po">-</p>
              </div>
            </div>
            
            <form id="form-receiving" class="space-y-6" novalidate>
              <input type="hidden" id="r-group-index">

              <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                <label class="block text-sm font-medium text-gray-700 mb-1.5">วันที่มาส่ง (ATA) <span class="text-red-500">*</span></label>
                <input type="date" id="r-ata" required class="input-field text-base py-2.5 font-medium text-brand-orange border-gray-200 focus:border-brand-orange focus:ring-1 focus:ring-brand-orange">
              </div>

              <div>
                <h3 class="font-bold text-gray-800 mb-3 flex justify-between items-end">
                    <span class="flex items-center gap-1.5"><i data-lucide="list-checks" class="w-5 h-5 text-brand-blue"></i> รายการสินค้าตามใบสั่งซื้อ (PO)</span>
                    <button type="button" onclick="readAllPOItems()" class="text-xs flex items-center gap-1 bg-brand-orangeLight text-brand-orange border border-brand-orange/20 px-2.5 py-1.5 rounded-lg font-bold hover:bg-orange-100 transition shadow-sm active:scale-95">
                        <i data-lucide="volume-2" class="w-4 h-4"></i> ฟังทั้งหมด
                    </button>
                </h3>
                <div id="r-items-container" class="space-y-3"></div>
              </div>

              <div class="mt-8 bg-brand-orangeLight/30 p-4 rounded-xl border border-brand-orange/20">
                <h3 class="font-bold text-brand-orange mb-3 flex items-center gap-1.5"><i data-lucide="gift" class="w-4 h-4"></i> ของแถม / สินค้านอกบิล</h3>
                <div id="r-extra-items-container" class="space-y-3 mb-4"></div>
                <button type="button" onclick="addExtraItemRow()" class="w-full border-2 border-dashed border-brand-orange/40 text-brand-orange bg-white hover:bg-brand-orangeLight/50 py-2.5 rounded-lg text-sm font-bold transition flex items-center justify-center gap-1.5 active:scale-95"><i data-lucide="plus" class="w-4 h-4"></i> เพิ่มรายการนอกบิล</button>
              </div>

              <div id="r-lift-fee-section"></div>

              <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                <label class="block text-sm font-medium text-gray-700 mb-1.5">หมายเหตุท้ายบิล (แวท, เลขที่ใบกำกับ ฯลฯ)</label>
                <textarea id="r-remark" class="input-field text-sm py-3 border-gray-200 focus:border-brand-orange focus:ring-1 focus:ring-brand-orange" rows="2" placeholder="ระบุหมายเหตุ..."></textarea>
              </div>

              <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                <label class="block text-sm font-medium text-gray-700 mb-1.5">ชื่อผู้รับสินค้า <span class="text-red-500">*</span></label>
                <input type="text" id="r-receiver" required class="input-field text-base py-2.5 font-medium border-gray-200 focus:border-brand-orange focus:ring-1 focus:ring-brand-orange" placeholder="ชื่อพนักงาน...">
              </div>

              <!-- กลุ่ม 3 ปุ่ม -->
              <div class="pt-5 sticky bottom-0 bg-[#f3f4f6]/95 backdrop-blur-md p-3 -mx-3 sm:-mx-5 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] flex gap-2 overflow-x-auto hide-scroll rounded-t-2xl border-t border-gray-200">
                <button type="button" id="btn-draft" class="btn bg-white text-gray-600 hover:bg-gray-50 border border-gray-300 py-3.5 flex-1 min-w-[100px] whitespace-nowrap shadow-sm font-bold">📝 พักบิล</button>
                <button type="button" id="btn-review" class="btn bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3.5 flex-1 shadow-md min-w-[120px] whitespace-nowrap">⏳ รับสินค้าเสร็จแล้ว</button>
                <button type="button" id="btn-confirm-receive" class="btn bg-brand-orange hover:bg-[#CC4904] shadow-md shadow-brand-orange/30 text-white font-bold py-3.5 flex-1 min-w-[130px] whitespace-nowrap hidden">✅ ยืนยันรับสินค้า</button>
              </div>
            </form>
          </div>
        </section>

      </main>
  </div>

  <div id="data-loader" class="fixed inset-0 bg-white/80 z-[9000] hidden flex-col justify-center items-center backdrop-blur-sm">
      <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-[#E35205] mb-4"></div>
      <p class="text-brand-orange font-medium" id="data-loader-text">กำลังประมวลผล...</p>
  </div>
  <div id="toast-container" class="toast-container"></div>

  <script>
    var APP_CONFIG = {
        API_URL: "https://script.google.com/macros/s/AKfycbwv2oGqYocA-k-EN2qjs_rf64gc9kDCG2o2nIKlAW0BDCT0rXLvcgLurCRaQXjuC-OG/exec",
        PORTAL_URL: "https://akra-web.github.io/Main/", 
        REQUIRED_ROLES: ["ADMIN", "AKRA", "WAREHOUSE"], 
        APP_NAME: "ระบบรับสินค้า (GR)",
        STORAGE_KEY: "akra_gr_session"
    };

    var DATA_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8SMnMPX9Cs7VDj-tkr-Vo9LTs4e2SEEg4OWr616VcM6Nz6IBWxRjxMPkBRG05yhA/exec";
    
    var appData = { products: [], pendingPOs: [] };
    var groupedPOs = []; 
    var currentActiveGroup = null; 

    if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    var UI = {
        showLoading: () => { document.body.classList.add('loading-active'); document.getElementById('auth-loading').classList.remove('hidden'); document.getElementById('auth-error').classList.add('hidden'); document.getElementById('app-content').classList.add('hidden'); },
        showError: (message) => { document.body.classList.remove('loading-active'); document.getElementById('auth-loading').classList.add('hidden'); const errorSection = document.getElementById('auth-error'); errorSection.classList.remove('hidden'); document.getElementById('error-message').innerText = message; },
        showApp: (username) => { document.body.classList.remove('loading-active'); document.getElementById('auth-loading').classList.add('hidden'); document.getElementById('app-content').classList.remove('hidden'); document.getElementById('display-username').innerText = username; }
    };

    var AuthGuard = {
        init: async () => {
            lucide.createIcons();
            UI.showLoading();
            try {
                const isPreviewEnv = window.self !== window.top || window.location.hostname === "" || window.location.hostname === "localhost" || window.location.hostname.includes("googleusercontent");
                if (isPreviewEnv) {
                    window.currentUser = "พนักงานคลังสินค้า (Preview)";
                    UI.showApp(window.currentUser);
                    AuthGuard.bindEvents();
                    await openReceiving();
                    return; 
                }

                const urlParams = new URLSearchParams(window.location.search);
                const ssoToken  = urlParams.get('sso');

                if (ssoToken) {
                    const fixedSsoToken = ssoToken.replace(/ /g, '+');
                    window.history.replaceState({}, document.title, window.location.pathname);

                    const rolesParam = APP_CONFIG.REQUIRED_ROLES.length ? '&roles=' + APP_CONFIG.REQUIRED_ROLES.join(',') : '';
                    const verifyURL = `${APP_CONFIG.API_URL}?action=verifyToken&token=${encodeURIComponent(fixedSsoToken)}${rolesParam}`;
                    
                    const response  = await fetch(verifyURL);
                    if (!response.ok) throw new Error("API_ERROR");
                    const result = await response.json();

                    if (!result.valid) {
                        localStorage.removeItem(APP_CONFIG.STORAGE_KEY);
                        UI.showError('เกิดข้อผิดพลาดในการยืนยันตัวตน');
                        return;
                    }

                    localStorage.setItem(APP_CONFIG.STORAGE_KEY, JSON.stringify({ name: result.user.name, id: result.user.id, roles: result.user.roles }));
                    window.currentUser = result.user.name;
                    UI.showApp(result.user.name);
                    AuthGuard.bindEvents();
                    await openReceiving();
                } else {
                    const cached = localStorage.getItem(APP_CONFIG.STORAGE_KEY);
                    if (!cached) { UI.showError("กรุณาเข้าสู่ระบบผ่านหน้า Portal"); return; }
                    let session;
                    try { session = JSON.parse(cached); } catch(e) { localStorage.removeItem(APP_CONFIG.STORAGE_KEY); UI.showError("Session ไม่ถูกต้อง"); return; }

                    const hasPermission = APP_CONFIG.REQUIRED_ROLES.length === 0 || session.roles.some(r => APP_CONFIG.REQUIRED_ROLES.includes(r));
                    if (!hasPermission) { localStorage.removeItem(APP_CONFIG.STORAGE_KEY); UI.showError("คุณไม่มีสิทธิ์เข้าถึง"); return; }

                    window.currentUser = session.name;
                    UI.showApp(session.name);
                    AuthGuard.bindEvents();
                    await openReceiving();
                }
            } catch (error) {
                console.error("Auth Error:", error);
                const isPreviewEnv = window.self !== window.top || window.location.hostname === "";
                if (isPreviewEnv) { window.currentUser = "พนักงานคลัง (API Error)"; UI.showApp(window.currentUser); AuthGuard.bindEvents(); await openReceiving(); } 
                else { UI.showError("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์เพื่อตรวจสอบสิทธิ์ได้"); }
            }
        },
        bindEvents: () => {
            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) { logoutBtn.addEventListener('click', () => { localStorage.removeItem(APP_CONFIG.STORAGE_KEY); window.location.href = APP_CONFIG.PORTAL_URL; }); }
        }
    };
    document.addEventListener('DOMContentLoaded', AuthGuard.init);

    function showDataLoading(text = 'กำลังโหลด...') { document.getElementById('data-loader-text').innerText = text; document.getElementById('data-loader').classList.remove('hidden'); document.getElementById('data-loader').classList.add('flex'); }
    function hideDataLoading() { document.getElementById('data-loader').classList.add('hidden'); document.getElementById('data-loader').classList.remove('flex'); }
    function showNotification(msg, type='success') {
        const c = document.getElementById('toast-container'); if(!c) return;
        const t = document.createElement('div'); t.className = `toast ${type}`;
        let icon = type === 'success' ? `<i data-lucide="check-circle" class="w-6 h-6 text-emerald-500 flex-shrink-0"></i>` : (type === 'warning' ? `<i data-lucide="alert-triangle" class="w-6 h-6 text-yellow-500 flex-shrink-0"></i>` : `<i data-lucide="x-circle" class="w-6 h-6 text-red-500 flex-shrink-0"></i>`);
        t.innerHTML = `${icon}<div class="flex-1"><p class="text-sm font-medium text-gray-800">${msg}</p></div>`;
        c.appendChild(t); lucide.createIcons({root: t});
        setTimeout(() => { t.classList.add('closing'); t.addEventListener('animationend', () => t.remove()); }, 4000);
    }
    
    function showView(viewId) { 
        if ('speechSynthesis' in window) window.speechSynthesis.cancel(); 
        document.querySelectorAll('main > section').forEach(div => div.classList.add('hidden')); 
        document.getElementById(viewId).classList.remove('hidden'); 
        window.scrollTo(0, 0); 
    }

    function getWarehouseBadge(warehouse) {
        switch(warehouse) {
            case 'W1': return `<span class="bg-white text-gray-700 border border-gray-300 text-[10px] font-bold px-2 py-0.5 rounded-md shadow-sm inline-flex items-center tracking-wide">W1</span>`;
            case 'W2': return `<span class="bg-brand-orange text-white text-[10px] font-bold px-2 py-0.5 rounded-md shadow-sm inline-flex items-center tracking-wide">W2</span>`;
            case 'W3': return `<span class="bg-yellow-400 text-yellow-900 text-[10px] font-bold px-2 py-0.5 rounded-md shadow-sm inline-flex items-center tracking-wide">W3</span>`;
            case 'W4': return `<span class="bg-green-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-md shadow-sm inline-flex items-center tracking-wide">W4</span>`;
            case 'W5': return `<span class="bg-gray-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-md shadow-sm inline-flex items-center tracking-wide">W5</span>`;
            case 'C1': return `<span class="bg-sky-400 text-white text-[10px] font-bold px-2 py-0.5 rounded-md shadow-sm inline-flex items-center tracking-wide">C1</span>`;
            case 'C2': return `<span class="bg-brand-blue text-white text-[10px] font-bold px-2 py-0.5 rounded-md shadow-sm inline-flex items-center tracking-wide">C2</span>`;
            default: return `<span class="bg-gray-200 text-gray-700 text-[10px] font-bold px-2 py-0.5 rounded-md shadow-sm inline-flex items-center tracking-wide">${warehouse}</span>`;
        }
    }

    async function apiCall(action, payload = null) {
      if (!navigator.onLine) return { success: false, message: 'Offline' };
      try {
        const res = await fetch(DATA_SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action, data: payload }) });
        return await res.json();
      } catch (error) { return { success: false, error: 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้' }; }
    }

    async function openReceiving(isManualRefresh = false) {
        const cachedData = localStorage.getItem('CACHE_GR_DATA');
        if (cachedData && !isManualRefresh) {
            try {
                appData = JSON.parse(cachedData);
                groupPendingPOs();
                renderPOListForReceiving();
                showView('receiving-list-view');
                showNotification('กำลังอัปเดตข้อมูลล่าสุด...', 'warning');
            } catch(e) { showDataLoading('กำลังโหลดข้อมูลรอรับเข้า...'); }
        } else {
            showDataLoading('กำลังโหลดข้อมูลรอรับเข้า...');
        }

        const response = await apiCall('getInitialData');
        
        if (!cachedData || isManualRefresh) hideDataLoading();

        if (response.success) { 
            localStorage.setItem('CACHE_GR_DATA', JSON.stringify(response));
            appData = response; 
            groupPendingPOs(); 
            renderPOListForReceiving(); 
            
            if (!cachedData && !isManualRefresh) showView('receiving-list-view'); 
        } else if (!cachedData) { 
            showNotification('ดึงข้อมูลไม่สำเร็จ', 'error'); 
        }
    }

    function groupPendingPOs() {
      const groups = {};
      if(appData.pendingPOs) {
          appData.pendingPOs.forEach(po => {
            const key = po.poNumber + '|' + po.vendor + '|' + po.poDate + '|' + po.warehouse + '|' + po.status;
            if (!groups[key]) groups[key] = { poNumber: po.poNumber, vendor: po.vendor, poDate: po.poDate, warehouse: po.warehouse, status: po.status, items: [] };
            groups[key].items.push(po);
          });
      }
      groupedPOs = Object.values(groups).sort((a, b) => {
        let getScore = (group) => {
            if (group.items.some(i => i.displayStatus === 'Overdue')) return 4;
            if (group.status === 'Pending Review') return 3;
            if (group.status === 'Draft GR') return 2;
            return 1;
        };
        return getScore(b) - getScore(a);
      });
    }

        const displayGroups = groupedPOs.filter(g => {
            const hasOverdue = g.items.some(i => i.displayStatus === 'Overdue'); 
            const isDraft = g.status === 'Draft GR';
            const isPendingReview = g.status === 'Pending Review';
            
            if(filterWh && g.warehouse !== filterWh) return false;
            if(filterStatus === 'Overdue' && !hasOverdue) return false;
            if(filterStatus === 'Draft GR' && !isDraft) return false;
            if(filterStatus === 'Pending Review' && !isPendingReview) return false;

            if(search && !g.vendor.toLowerCase().includes(search) && !g.items.some(i => i.product.toLowerCase().includes(search)) && !(g.poNumber||'').toLowerCase().includes(search)) return false;

    function setupAutocomplete(inputEl) {
        const suggestionBox = inputEl.nextElementSibling.nextElementSibling;
        inputEl.addEventListener('input', function() {
            const val = this.value.trim().toLowerCase(); suggestionBox.innerHTML = '';
            if (!val || !appData.products || appData.products.length === 0) { suggestionBox.classList.add('hidden'); return; }
            const filtered = appData.products.filter(p => p.name.toLowerCase().includes(val)).slice(0, 15);
            if (filtered.length === 0) { suggestionBox.classList.add('hidden'); return; }
            
            filtered.forEach(p => {
                const li = document.createElement('li'); li.className = 'px-3 py-2 hover:bg-orange-50 cursor-pointer text-sm font-medium text-gray-700 flex justify-between';
                li.innerHTML = `<span>${p.name}</span> <span class="text-[10px] text-gray-400">${p.unit}</span>`;
                li.onmousedown = function(e) {
                    e.preventDefault(); inputEl.value = p.name;
                    const row = inputEl.closest('.extra-item-row');
                    row.querySelector('.ex-sku').value = p.sku || ''; 
                    row.querySelector('.ex-unit').value = p.unit || ''; 
                    row.querySelector('.ex-qty').focus();
                    suggestionBox.classList.add('hidden');
                };
                suggestionBox.appendChild(li);
            });
            suggestionBox.classList.remove('hidden');
        });
        inputEl.addEventListener('blur', () => setTimeout(() => suggestionBox.classList.add('hidden'), 200));
        inputEl.addEventListener('focus', function() { if (this.value && suggestionBox.children.length > 0) suggestionBox.classList.remove('hidden'); });
    }

    async function submitReceiving(e, targetStatus) {
      e.preventDefault();
      const isDraft = targetStatus === 'Draft GR';
      
      const ataInput = document.getElementById('r-ata'); const receiverInput = document.getElementById('r-receiver');
      ataInput.classList.remove('input-error'); receiverInput.classList.remove('input-error');

      const ata = ataInput.value; const receiverName = receiverInput.value.trim(); 
      let remark = document.getElementById('r-remark').value.trim();
      
      const liftFeeContainer = document.getElementById('lift-fee-container');
      if (liftFeeContainer) {
          const selectedLiftFee = document.querySelector('input[name="lift-fee"]:checked');
          const liftRounds = document.getElementById('lift-fee-rounds').value.trim();
          const rounds = parseInt(liftRounds);
          
          if (selectedLiftFee && !isNaN(rounds) && rounds > 0) {
              remark = `[ค่าลิฟท์ ${rounds} รอบ ${selectedLiftFee.value}] ` + remark;
          }
      }

      // ถ้าเป็น Pending Review หรือ GR Completed ต้องบังคับกรอกข้อมูลพื้นฐานให้ครบ
      if (!isDraft && (!ata || !receiverName)) {
          if(!ata) ataInput.classList.add('input-error'); if(!receiverName) receiverInput.classList.add('input-error');
          return showNotification("กรุณาระบุวันที่รับและชื่อผู้รับให้ครบถ้วนก่อนยืนยัน", "warning");
      }

      const index = document.getElementById('r-group-index').value; 
      const group = currentActiveGroup || groupedPOs[index];
      if (!group) return showNotification("ไม่พบข้อมูลกลุ่มสินค้า กรุณาลองใหม่อีกครั้ง", "error");
      let formHasError = false;

      const poItemsData = [];
      document.querySelectorAll('.po-item-row').forEach(row => {
          const rowNum = row.dataset.rownum;
          const uid = row.dataset.uid;
          const qtyInput = row.querySelector('.po-qty'); const locInput = row.querySelector('.po-loc');
          qtyInput.classList.remove('input-error'); locInput.classList.remove('input-error');

          const grQty = qtyInput.value.trim(); const locIn = locInput.value.trim(); const unit = row.querySelector('.po-unit').value.trim(); const exp = row.querySelector('.po-exp').value.trim();
          const oldStockInput = row.querySelector('.po-old-stock'); const oldStock = oldStockInput ? oldStockInput.value.trim() : '';

          if (grQty && parseFloat(grQty) > 0) {
              if (!isDraft && !locIn) { locInput.classList.add('input-error'); formHasError = true; }
              poItemsData.push({ rowNumber: rowNum, uid: uid, grQty, unit, locIn, exp, oldStock });
          } else if (isDraft) {
              poItemsData.push({ rowNumber: rowNum, uid: uid, grQty: "", unit, locIn, exp, oldStock });
          }
      });

      const extraItemsData = [];
      document.querySelectorAll('.extra-item-row').forEach(row => {
          const pInput = row.querySelector('.ex-product'); const qInput = row.querySelector('.ex-qty'); const lInput = row.querySelector('.ex-loc');
          pInput.classList.remove('input-error'); qInput.classList.remove('input-error'); lInput.classList.remove('input-error');

          const sku = row.querySelector('.ex-sku') ? row.querySelector('.ex-sku').value.trim() : '';
          const product = pInput.value.trim(); const grQty = qInput.value.trim(); const locIn = lInput.value.trim(); const unit = row.querySelector('.ex-unit').value.trim(); const exp = row.querySelector('.ex-exp').value.trim();
          const oldStockInput = row.querySelector('.ex-old-stock'); const oldStock = oldStockInput ? oldStockInput.value.trim() : '';

          if (product || grQty) {
              if (!product) { pInput.classList.add('input-error'); formHasError = true; }
              if (!grQty) { qInput.classList.add('input-error'); formHasError = true; }
              if (!isDraft && !locIn) { lInput.classList.add('input-error'); formHasError = true; }
              if (product && grQty) extraItemsData.push({ sku, product, grQty, unit, locIn, exp, oldStock });
          }
      });

      if (formHasError) return showNotification("กรุณากรอกข้อมูลโลเคชั่น หรือข้อมูลของแถมให้ครบถ้วน", "warning");
      const totalReceived = poItemsData.filter(i => i.grQty && parseFloat(i.grQty) > 0).length + extraItemsData.length;
      if (!isDraft && totalReceived === 0) return showNotification("โปรดใส่จำนวนรับสินค้าอย่างน้อย 1 รายการ", "warning");

      const bulkPayload = {
          ata: Utilities_formatDateFrontEnd(ata), receiverName: receiverName, remark: remark.trim(), targetStatus: targetStatus,
          groupInfo: { poDate: group.poDate, vendor: group.vendor, poNumber: group.poNumber, warehouse: group.warehouse },
          items: poItemsData, extraItems: extraItemsData
      };

      let btnId = 'btn-draft';
      if(targetStatus === 'Pending Review') btnId = 'btn-review';
      else if(targetStatus === 'GR Completed') btnId = 'btn-confirm-receive';

      document.getElementById(btnId).disabled = true; showDataLoading(`กำลังบันทึกข้อมูลเข้าคลัง...`);

      const res = await apiCall('bulkReceivePO', bulkPayload);
      
      document.getElementById(btnId).disabled = false; 
      hideDataLoading();
      
      if(res.success) { 
          let msg = "บันทึกสำเร็จ!";
          if(targetStatus === 'Draft GR') msg = "พักบิล (Draft) เรียบร้อย";
          else if(targetStatus === 'Pending Review') msg = "ส่งให้ตรวจสอบเรียบร้อยแล้ว!";
          else msg = "ยืนยันรับสินค้าเข้าคลังสมบูรณ์!";
          
          showNotification(msg, "success"); 
          showView('receiving-list-view');
          
          openReceivingInBackground(); 
      } 
      else { showNotification("เกิดข้อผิดพลาด: " + res.message, "error"); }
    }

    async function openReceivingInBackground() {
        try {
            const response = await apiCall('getInitialData');
            if (response.success) { 
                localStorage.setItem('CACHE_GR_DATA', JSON.stringify(response));
                appData = response; 
                groupPendingPOs(); 
                renderPOListForReceiving(); 
            }
        } catch(e) {}
    }

    function parseDateToInput(ddmmyyyy) { if(!ddmmyyyy) return ''; const p = ddmmyyyy.split('/'); if(p.length === 3) return `${p[2]}-${p[1]}-${p[0]}`; return ddmmyyyy; }
    function Utilities_formatDateFrontEnd(dateStr) { if(!dateStr) return ''; const p = dateStr.split('-'); if(p.length === 3) return `${p[2]}/${p[1]}/${p[0]}`; return dateStr; }

    function speakText(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'th-TH'; 
            utterance.rate = 0.9; 
            
            const voices = window.speechSynthesis.getVoices();
            const thaiVoice = voices.find(voice => voice.lang.includes('th'));
            if (thaiVoice) utterance.voice = thaiVoice;

            window.speechSynthesis.speak(utterance);
        } else {
            showNotification('เบราว์เซอร์หรืออุปกรณ์ของคุณไม่รองรับการอ่านออกเสียง', 'warning');
        }
    }

    function readAllPOItems() {
        const index = document.getElementById('r-group-index').value;
        const group = currentActiveGroup || groupedPOs[index];
        if (!group) return;
        
        let fullText = "รายการสินค้าที่ต้องรับ มีดังนี้. ";
        group.items.forEach((item, i) => {
            fullText += `รายการที่ ${i+1}. ${item.product} จำนวน ${item.quantity} ${item.unit || ''}. `;
        });
        
        speakText(fullText);
    }
  </script>
</body>
</html>
